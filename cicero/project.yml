name: Cicero
# ─────────────────────────────────────────────────────────────
# Cicero — a mobile "vibe coding" companion for iPhone/iPad.
# NEW standalone app in the Prismet monorepo (see cicero/README.md).
# Deliberately its OWN app/team so it never touches the shipping
# SpocksClub "Prismet" App Store lane.
#
# Regenerate the .xcodeproj after every clone/pull:  xcodegen generate
# The .xcodeproj is gitignored (see repo root .gitignore).
# ─────────────────────────────────────────────────────────────
options:
  bundleIdPrefix: com.gtrktscrb
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: en
  createIntermediateGroups: true

settings:
  base:
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: YJR3ABV3H4
    TARGETED_DEVICE_FAMILY: "1,2"
    SWIFT_VERSION: "5.0"

targets:
  Cicero:
    type: application
    platform: iOS
    sources:
      - path: Sources
    info:
      path: Info.plist
      properties:
        CFBundleDisplayName: Cicero
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        UILaunchScreen: {}
        ITSAppUsesNonExemptEncryption: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.gtrktscrb.cicero
        PRODUCT_NAME: Cicero
        ENABLE_PREVIEWS: "YES"
        CURRENT_PROJECT_VERSION: "1"
        MARKETING_VERSION: "0.1"

  CiceroTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests
    dependencies:
      - target: Cicero
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.gtrktscrb.cicero.tests
        GENERATE_INFOPLIST_FILE: "YES"

schemes:
  Cicero:
    build:
      targets:
        Cicero: all
        CiceroTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - CiceroTests
