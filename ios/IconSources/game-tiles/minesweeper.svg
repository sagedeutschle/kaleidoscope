<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Win95 minesweeper: beveled cells, revealed numbers, one flag planted -->
  <rect width="512" height="512" fill="#BDBDBD"/>
  <defs>
    <g id="raised">
      <rect width="160" height="160" fill="#C6C6C6"/>
      <path d="M0 160 L0 0 L160 0 L138 22 L22 22 L22 138 Z" fill="#FFFFFF"/>
      <path d="M160 0 L160 160 L0 160 L22 138 L138 138 L138 22 Z" fill="#828282"/>
    </g>
    <g id="revealed">
      <rect width="160" height="160" fill="#BDBDBD" stroke="#9A9A9A" stroke-width="6"/>
    </g>
  </defs>
  <use href="#raised" x="16" y="16"/>
  <use href="#revealed" x="176" y="16"/>
  <use href="#raised" x="336" y="16"/>
  <use href="#revealed" x="16" y="176"/>
  <use href="#revealed" x="176" y="176"/>
  <use href="#raised" x="336" y="176"/>
  <use href="#raised" x="16" y="336"/>
  <use href="#revealed" x="176" y="336"/>
  <use href="#raised" x="336" y="336"/>
  <g font-family="Helvetica" font-weight="bold" font-size="104" text-anchor="middle">
    <text x="256" y="134" fill="#1D4ED8">1</text>
    <text x="96" y="294" fill="#15803D">2</text>
    <text x="256" y="294" fill="#1D4ED8">1</text>
    <text x="256" y="454" fill="#B91C1C">3</text>
  </g>
  <!-- the flag, planted on a raised cell -->
  <g transform="translate(416,256)">
    <rect x="-34" y="54" width="68" height="16" rx="4" fill="#17142E"/>
    <rect x="-20" y="42" width="40" height="14" rx="4" fill="#17142E"/>
    <rect x="-6" y="-58" width="12" height="102" fill="#17142E"/>
    <path d="M6 -58 L6 -6 L-62 -32 Z" fill="#E33B2E"/>
  </g>
</svg>
