<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- kaya wood goban, mid-game stones, gold last-move ring -->
  <defs>
    <linearGradient id="wood" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#D9AC6C"/>
      <stop offset="0.55" stop-color="#C89B5E"/>
      <stop offset="1" stop-color="#B9884E"/>
    </linearGradient>
    <radialGradient id="black" cx="0.35" cy="0.3" r="0.9">
      <stop offset="0" stop-color="#4A4A52"/>
      <stop offset="0.5" stop-color="#1B1B22"/>
      <stop offset="1" stop-color="#0A0A0E"/>
    </radialGradient>
    <radialGradient id="white" cx="0.35" cy="0.3" r="0.95">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="0.7" stop-color="#EFEBE0"/>
      <stop offset="1" stop-color="#CFC9B8"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" fill="url(#wood)"/>
  <!-- faint grain bands -->
  <g stroke="#A57B41" stroke-width="6" opacity="0.30" fill="none">
    <path d="M0 96 C 140 84, 320 110, 512 92"/>
    <path d="M0 236 C 180 224, 300 252, 512 238"/>
    <path d="M0 388 C 150 376, 340 404, 512 386"/>
  </g>
  <rect x="14" y="14" width="484" height="484" fill="none" stroke="#8A6534" stroke-width="16" opacity="0.6"/>
  <!-- grid -->
  <g stroke="#4A3418" stroke-width="5">
    <line x1="72" y1="72" x2="72" y2="440"/>
    <line x1="164" y1="72" x2="164" y2="440"/>
    <line x1="256" y1="72" x2="256" y2="440"/>
    <line x1="348" y1="72" x2="348" y2="440"/>
    <line x1="440" y1="72" x2="440" y2="440"/>
    <line x1="72" y1="72" x2="440" y2="72"/>
    <line x1="72" y1="164" x2="440" y2="164"/>
    <line x1="72" y1="256" x2="440" y2="256"/>
    <line x1="72" y1="348" x2="440" y2="348"/>
    <line x1="72" y1="440" x2="440" y2="440"/>
  </g>
  <!-- hoshi -->
  <g fill="#4A3418">
    <circle cx="164" cy="164" r="9"/>
    <circle cx="348" cy="164" r="9"/>
    <circle cx="256" cy="256" r="9"/>
    <circle cx="164" cy="348" r="9"/>
    <circle cx="348" cy="348" r="9"/>
  </g>
  <!-- stones (contact shadows first) -->
  <g fill="#4A3418" opacity="0.35">
    <ellipse cx="260" cy="170" rx="42" ry="14"/>
    <ellipse cx="352" cy="262" rx="42" ry="14"/>
    <ellipse cx="168" cy="262" rx="42" ry="14"/>
    <ellipse cx="260" cy="354" rx="42" ry="14"/>
    <ellipse cx="444" cy="170" rx="42" ry="14"/>
  </g>
  <circle cx="256" cy="164" r="42" fill="url(#black)"/>
  <circle cx="348" cy="256" r="42" fill="url(#white)"/>
  <circle cx="164" cy="256" r="42" fill="url(#white)"/>
  <circle cx="256" cy="348" r="42" fill="url(#black)"/>
  <circle cx="440" cy="164" r="42" fill="url(#black)"/>
  <!-- last-move ring -->
  <circle cx="256" cy="348" r="18" fill="none" stroke="#D9A441" stroke-width="7"/>
</svg>
