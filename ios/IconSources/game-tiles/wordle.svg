    <text x="256" y="247">O</text>
    <rect x="310" y="180" width="88" height="88" rx="8" fill="none" stroke="#565758" stroke-width="6"/>
    <text x="354" y="247">W</text>
    <rect x="408" y="180" width="88" height="88" rx="8" fill="none" stroke="#3A3A3C" stroke-width="6"/>
  </g>
  <!-- keyboard hint at the bottom -->
  <g fill="#818384">
    <rect x="46" y="360" width="60" height="76" rx="8"/>
    <rect x="116" y="360" width="60" height="76" rx="8"/>
    <rect x="186" y="360" width="60" height="76" rx="8" fill="#538D4E"/>
    <rect x="256" y="360" width="60" height="76" rx="8"/>
    <rect x="326" y="360" width="60" height="76" rx="8"/>
    <rect x="396" y="360" width="60" height="76" rx="8" fill="#B59F3B"/>
    <rect x="80" y="446" width="60" height="66" rx="8"/>
