<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- daily word grid mid-guess -->
  <rect width="512" height="512" fill="#121213"/>
  <g font-family="Helvetica" font-weight="bold" font-size="68" text-anchor="middle" fill="#FFFFFF">
    <!-- guessed row -->
    <rect x="16" y="64" width="88" height="88" rx="8" fill="#538D4E"/>
    <text x="60" y="131">C</text>
    <rect x="114" y="64" width="88" height="88" rx="8" fill="#3A3A3C"/>
    <text x="158" y="131">R</text>
    <rect x="212" y="64" width="88" height="88" rx="8" fill="#B59F3B"/>
    <text x="256" y="131">A</text>
    <rect x="310" y="64" width="88" height="88" rx="8" fill="#3A3A3C"/>
    <text x="354" y="131">N</text>
    <rect x="408" y="64" width="88" height="88" rx="8" fill="#538D4E"/>
    <text x="452" y="131">E</text>
    <!-- current row: two letters typed -->
    <rect x="16" y="180" width="88" height="88" rx="8" fill="none" stroke="#565758" stroke-width="6"/>
    <text x="60" y="247">M</text>
    <rect x="114" y="180" width="88" height="88" rx="8" fill="none" stroke="#565758" stroke-width="6"/>
    <text x="158" y="247">E</text>
