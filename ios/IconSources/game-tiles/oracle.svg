<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- the Wizard King's decree: parchment scroll, wax seal, gilt on navy -->
  <rect width="512" height="512" fill="#16132F"/>
  <!-- sparkles -->
  <g fill="#D4A53C">
    <path d="M92 84 L100 106 L122 114 L100 122 L92 144 L84 122 L62 114 L84 106 Z"/>
    <path d="M436 396 L442 412 L458 418 L442 424 L436 440 L430 424 L414 418 L430 412 Z"/>
    <circle cx="452" cy="96" r="7"/>
    <circle cx="72" cy="420" r="6"/>
  </g>
  <g transform="translate(256,262) rotate(-4)">
    <!-- shadow -->
    <rect x="-198" y="-136" width="396" height="272" rx="10" transform="translate(8,14)" fill="#000000" opacity="0.35"/>
    <!-- parchment body -->
    <rect x="-198" y="-136" width="396" height="272" rx="10" fill="#EFE3C2" stroke="#17142E" stroke-width="9"/>
    <!-- rolled ends -->
    <rect x="-226" y="-152" width="56" height="304" rx="28" fill="#E4D5AC" stroke="#17142E" stroke-width="9"/>
    <ellipse cx="-198" cy="0" rx="16" ry="130" fill="#D6C495" opacity="0.7"/>
    <rect x="170" y="-152" width="56" height="304" rx="28" fill="#E4D5AC" stroke="#17142E" stroke-width="9"/>
    <ellipse cx="198" cy="0" rx="16" ry="130" fill="#D6C495" opacity="0.7"/>
    <!-- decree script -->
    <g stroke="#8A7A54" stroke-width="11" stroke-linecap="round">
      <line x1="-140" y1="-84" x2="60" y2="-84"/>
      <line x1="-140" y1="-40" x2="132" y2="-40"/>
      <line x1="-140" y1="4" x2="132" y2="4"/>
      <line x1="-140" y1="48" x2="30" y2="48"/>
    </g>
    <!-- gold flourish initial -->
    <path d="M-140 -110 L-96 -110 M-118 -110 L-118 -62" fill="none" stroke="#B8933A" stroke-width="13" stroke-linecap="round"/>
    <!-- crimson wax seal with gilt fleur -->
    <g transform="translate(108,96)">
      <circle r="62" fill="#8E2430" stroke="#17142E" stroke-width="9"/>
      <circle r="46" fill="none" stroke="#6E1A24" stroke-width="7"/>
      <path d="M0 -30 C10 -18 12 -8 6 2 L14 2 C22 -6 26 -12 30 -10 C34 -2 24 8 10 10 L6 10 C8 18 12 22 16 26 L-16 26 C-12 22 -8 18 -6 10 L-10 10 C-24 8 -34 -2 -30 -10 C-26 -12 -22 -6 -14 2 L-6 2 C-12 -8 -10 -18 0 -30 Z" fill="#D4A53C"/>
    </g>
  </g>
</svg>
