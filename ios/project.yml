name: Prismet
options:
  bundleIdPrefix: com.spocksclub
  deploymentTarget:
    iOS: "17.0"
    watchOS: "11.0"
  developmentLanguage: en
  createIntermediateGroups: true

settings:
  base:
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ZW9HBTRLRT
    TARGETED_DEVICE_FAMILY: "1,2"
    SWIFT_VERSION: "5.0"
    SWIFT_OBJC_INTEROP_MODE: objcxx

packages:
  PrismetShared:
    path: ../shared/PrismetShared
  WatchFieldDeckCore:
    path: ../shared/WatchFieldDeckCore
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.0.0"
  GoogleMobileAds:
    url: https://github.com/googleads/swift-package-manager-google-mobile-ads.git
    from: "11.9.0"
  StockFishKit_iOS:
    url: https://github.com/SoumitSaha/StockFishKit_iOS.git
    from: "2.0.2"

targets:
  Prismet:
    type: application
    platform: iOS
    sources:
      - path: Sources
      - path: Resources
    dependencies:
      - package: PrismetShared
        product: PrismetShared
      - package: WatchFieldDeckCore
        product: WatchFieldDeckCore
      - package: Supabase
        product: Supabase
      - package: GoogleMobileAds
        product: GoogleMobileAds
      - package: StockFishKit_iOS
        product: StockFishKit_iOS
      - target: Prismet Watch App
    info:
      path: Info.plist
      properties:
        CFBundleDisplayName: Prismet
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        UILaunchScreen: {}
        CFBundleIconName: AppIcon
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~iphone:
          - UIInterfaceOrientationPortrait
        ITSAppUsesNonExemptEncryption: false
        # Required for GKLocalPlayer.loadFriends() (friends leaderboard). Without
        # it GameKit silently returns no friends. NOTE: xcodegen REGENERATES
        # Info.plist from this properties block — edit keys HERE, not in the file.
        NSGKFriendListUsageDescription: Prismet shows your Game Center friends on the friends leaderboard so you can compare scores.
        # Google's official TEST AdMob app id; swap for the real ca-app-pub-...~... once created.
        GADApplicationIdentifier: ca-app-pub-3940256099942544~1458002511
        # Leave blank for Google's test banner; set to real ca-app-pub-.../... banner unit to go live.
        PrismetAdMobBannerUnitID: ""
        # Non-consumable StoreKit product. Configure this product in App Store Connect at $4.99.
        PrismetRemoveAdsProductID: com.spocksclub.kaleidoscope.removeads
        # SHA-256 hashes of private tester/family codes. Do not store the raw codes here.
        PrismetAdUnlockCodeHashes: []
        SKAdNetworkItems:
          - SKAdNetworkIdentifier: cstr6suwn9.skadnetwork
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.spocksclub.kaleidoscope
        PRODUCT_NAME: Prismet
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_PREVIEWS: "YES"
        TARGETED_DEVICE_FAMILY: "1,2"
        CODE_SIGN_ENTITLEMENTS: Prismet.entitlements
        CURRENT_PROJECT_VERSION: "14"
        MARKETING_VERSION: "1.2"
        OTHER_SWIFT_FLAGS: "$(inherited) -cxx-interoperability-mode=default"

  Prismet Watch App:
    type: application
    platform: watchOS
    deploymentTarget: "11.0"
    sources:
      - path: WatchFieldDeck
    dependencies:
      - package: WatchFieldDeckCore
        product: WatchFieldDeckCore
      - target: Prismet Field Deck Widget
        embed: true
    info:
      path: WatchFieldDeck/Info.plist
      properties:
        CFBundleDisplayName: Field Deck
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        CFBundleURLTypes:
          - CFBundleURLName: com.spocksclub.kaleidoscope.watchkitapp
            CFBundleURLSchemes:
              - fielddeck
        WKApplication: true
        WKCompanionAppBundleIdentifier: com.spocksclub.kaleidoscope
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.spocksclub.kaleidoscope.watchkitapp
        PRODUCT_NAME: Prismet Watch App
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CURRENT_PROJECT_VERSION: "14"
        MARKETING_VERSION: "1.2"
        SWIFT_VERSION: "5.0"

  Prismet Field Deck Widget:
    type: app-extension
    platform: watchOS
    deploymentTarget: "11.0"
    sources:
      - path: WatchFieldDeckWidget
    dependencies:
      - package: WatchFieldDeckCore
        product: WatchFieldDeckCore
    info:
      path: WatchFieldDeckWidget/Info.plist
      properties:
        CFBundleDisplayName: Field Deck Pulse
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.spocksclub.kaleidoscope.watchkitapp.fielddeck-widget
        PRODUCT_NAME: Prismet Field Deck Widget
        APPLICATION_EXTENSION_API_ONLY: "YES"
        SKIP_INSTALL: "YES"
        CURRENT_PROJECT_VERSION: "14"
        MARKETING_VERSION: "1.2"
        SWIFT_VERSION: "5.0"

  PrismetTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests
    dependencies:
      - target: Prismet
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.spocksclub.kaleidoscope.tests
        GENERATE_INFOPLIST_FILE: "YES"
