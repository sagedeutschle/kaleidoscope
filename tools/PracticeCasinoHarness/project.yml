name: PrismetPracticeCasino
options:
  bundleIdPrefix: com.prismet.preview
  createIntermediateGroups: true
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    CODE_SIGNING_ALLOWED: NO
    CODE_SIGNING_REQUIRED: NO

packages:
  PrismetShared:
    path: ../../shared/PrismetShared

targets:
  PrismetPracticeCasinoIOS:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Sources/iOS
      - path: ../../ios/Sources/Features/Casino
    dependencies:
      - package: PrismetShared
        product: PrismetShared
    info:
      path: Generated/PrismetPracticeCasinoIOS-Info.plist
      properties:
        CFBundleDisplayName: Prismet Practice Casino
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~iphone:
          - UIInterfaceOrientationPortrait
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.spocksclub.prismet.practice-casino-preview
        PRODUCT_NAME: Prismet Practice Casino
        TARGETED_DEVICE_FAMILY: "1,2"
        GENERATE_INFOPLIST_FILE: NO

  PrismetPracticeCasinoMac:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Sources/macOS
      - path: ../../macos/Sources/Casino
    dependencies:
      - package: PrismetShared
        product: PrismetShared
    info:
      path: Generated/PrismetPracticeCasinoMac-Info.plist
      properties:
        CFBundleDisplayName: Prismet Practice Casino
        LSApplicationCategoryType: public.app-category.card-games
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.gtrktscrb.prismet.practice-casino-preview
        PRODUCT_NAME: Prismet Practice Casino
        GENERATE_INFOPLIST_FILE: NO
        COMBINE_HIDPI_IMAGES: YES
