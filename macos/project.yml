name: Prismet
options:
  bundleIdPrefix: com.spocksclub
  createIntermediateGroups: true
  deploymentTarget:
    macOS: "14.0"

settings:
  base:
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGN_STYLE: Manual
    ENABLE_HARDENED_RUNTIME: NO

packages:
  PrismetShared:
    path: ../shared/PrismetShared
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.0.0"

targets:
  Prismet:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Sources
    dependencies:
      - package: PrismetShared
        product: PrismetShared
      - package: Supabase
        product: Supabase
    settings:
      base:
        PRODUCT_NAME: Prismet
        PRODUCT_BUNDLE_IDENTIFIER: com.spocksclub.kaleidoscope
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        MARKETING_VERSION: "1.2"
        CURRENT_PROJECT_VERSION: "18"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: "Prismet"
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: NO
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.board-games"
        INFOPLIST_KEY_NSMainStoryboardFile: ""
        INFOPLIST_KEY_NSPrincipalClass: "NSApplication"
        CODE_SIGN_ENTITLEMENTS: Prismet.entitlements
        COMBINE_HIDPI_IMAGES: YES
        ASSETCATALOG_COMPILER_GENERATE_ASSET_SYMBOLS: NO
        # App Store Connect uses cloud-managed signing. The test target retains the
        # base no-sign configuration, so local CODE_SIGNING_ALLOWED=NO tests remain valid.
        DEVELOPMENT_TEAM: ZW9HBTRLRT
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "Apple Development"
        ENABLE_HARDENED_RUNTIME: YES

  PrismetTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Tests
    dependencies:
      - target: Prismet
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.spocksclub.kaleidoscope.macos-tests
